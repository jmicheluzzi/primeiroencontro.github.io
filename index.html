<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juju e Nico️</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    font-family: Georgia, serif;
    background: #eef6e8;
}
.card {
    width: 100%;
    max-width: 430px;
    background: #ffffff;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}
.photo {
    width: 100%;
    height: 430px;
    object-fit: cover;
    display: block;
}
.content {
    padding: 28px;
    text-align: center;
}
h1 {
    color: #1f4d1f;
    font-size: 54px;
    margin-bottom: 10px;
}
.heart {
    color: #1f4d1f;
    font-size: 24px;
    margin: 8px;
}
.counter-box {
    background: #f1f8ed;
    border-radius: 22px;
    padding: 25px;
    margin: 24px 0;
}
.counter {
    font-size: 90px;
    color: #1f4d1f;
    font-weight: bold;
    line-height: 1;
}
.days {
    font-size: 18px;
    letter-spacing: 6px;
    margin-top: 10px;
    color: #1f4d1f;
}
.subtitle {
    color: #444;
    font-size: 24px;
    margin-top: 10px;
}
.message-box {
    background: #f1f8ed;
    border-radius: 22px;
    padding: 24px;
    margin-top: 25px;
}
.message {
    font-size: 18px;
    line-height: 1.4;
    color: #2b2b2b;
}
.love {
    margin-top: 12px;
    font-size: 34px;
    font-weight: bold;
    color: #1f4d1f;
}
.photo-2 {
    width: 100%;
    height: 430px;
    object-fit: cover;
    display: block;
    margin-top: 28px;
    border-radius: 22px;
}
</style>
</head>
<body>
<div class="card">
    <img class="photo" src="foto.jpeg">
    <div class="content">
        <h1>Juju e Nico</h1>
        <div class="heart">♥ ♥ ♥</div>
        <div class="counter-box">
            <div id="counter" class="counter"></div>
            <div class="days">DIAS</div>
        </div>
        <div class="subtitle">
            desde de nosso primeiro date
        </div>
        <div class="heart">♥</div>
        <div class="message-box">
            <div class="message">
                voce é:<br>
                o Sol pro meu Charizard<br>
                a Beauvoir pro meu Sartre
            </div>
            <div class="love">
                te amo bby ♥
            </div>
        </div>
        <img class="photo-2" src="foto_2.jpeg">
    </div>
</div>
<script>
const startDate = new Date(2025, 5, 22);

const now = new Date();
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

const diff = today - startDate;
const days = Math.round(diff / 86400000);

document.getElementById("counter").innerText = days;
</script>
</body>
</html>
